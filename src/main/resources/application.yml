spring:
  application:
    name: ecommerce-backend

  # Database Configuration
  datasource:
    url: jdbc:postgresql://postgres:5432/development_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update

    open-in-view: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false

        jdbc:
          batch_size: 20
          fetch_size: 50

      org.hibernate.envers:
        audit_table_suffix: _audit
        store_data_at_delete: true

  # Redis Configuration
  data:
    redis:
      host: ecommerce-redis
      port: 6379
      database: 0
      timeout: 2000ms

    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  # Flyway Configuration
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    enabled: true

# Server Configuration
server:
  port: 8080

  servlet:
    context-path: /api

  error:
    include-message: always
    include-binding-errors: always

# Security Configuration
app:
  jwt:
    secret: your-super-secret-key-change-this-in-production-minimum-32-characters
    expiration: 86400000
    refresh-token-expiration: 604800000

# Logging Configuration
logging:
  level:
    root: INFO
    com.ecommerce: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Meilisearch Configuration
meilisearch:
  host: http://localhost:7700
  api-key: test-api-key-change-in-production

# Cloudinary Configuration
cloudinary:
  cloud-name: your-cloud-name
  api-key: your-api-key
  api-secret: your-api-secret

# OpenAPI / Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html
    enabled: true

search:
  synonyms:
    chain: necklace,gold chain,silver chain
    necklace: chain,gold chain,silver chain

    laptop: notebook,macbook
    notebook: laptop,macbook
    macbook: laptop,notebook

    phone: mobile,smartphone
    mobile: phone,smartphone
    smartphone: phone,mobile